<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 引入字体图标 -->
    <title>供养人</title>
    <style>
         .follow{
            width: 80px;
            height: 50px;
            position: absolute;
            background-image: url('img/鼠标跟随.png');
            background-size:cover;
            background-repeat:no-repeat;
            z-index: 999;
        }
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            list-style: none;
        }

        body {
            overflow: hidden;
            /* 禁止页面滚动 */
            height: 100%;
            /* 确保页面高度固定 */
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            height: 100vh;
            background-image: linear-gradient(to top, #9795f0 0%, #fbc8d4 100%);
        }

        .shell {
            display: flex;
            align-items: center;
            position: relative;
            padding: 130px 0;
            /* margin-left: 50px; */
        }

        .carousel {
            position: relative;
            width: 520px;
            height: 850px;
            padding-top: 150px;
            perspective: 300px;
        }

        .arrows {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            position: absolute;
            bottom: 570px;
            right: -400px;
            z-index: 999;
        }

        .up,
        .next {
            margin: 5px 0;
            padding: 5px;
            width: 50px;
            height: 50px;
            border: 3px solid rgb(255, 255, 255);
            border-radius: 10px;
            background-color: #ffffff61;
            color: #fff;
            transition: .3s;
        }

        .up:hover,
        .next:hover {
            background-color: #fff;
            color: #000000;
        }

        .boxs {
            width: 100%;
            height: 400px;
            position: absolute;
            transform-style: preserve-3d;
            transition: 1s;
        }

        .box {
            position: absolute;
            width: 800px;
            height: 380px;
            border: 2px solid white;
            border-radius: 10px;
            overflow: hidden;
            opacity: .7;
        }

        .box img {
            width: 100%;
            transform: translateY(-50px);
            height: auto;
        }

        .box.selected {
            border-color: rgb(247, 247, 247);
            border-width: 5px;
            opacity: 1;
        }

        @font-face {
            font-family: "iconfont";
            /* Project id  */
            src: url('iconfont.ttf?t=1697001849953') format('truetype');
        }

        .iconfont {
            font-family: "iconfont" !important;
            font-size: 16px;
            font-style: normal;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .icon-xiajiantou:before {
            content: "\eb6d";
        }

        .icon-shangjiantou:before {
            content: "\eb6e";
        }

        .cta {
            position: absolute;
            bottom: 8%;
            display: flex;
            justify-content: center;
            width: 100%;
            z-index: 999;
        }

        .cta button {
            font-size: 15px;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.8);
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 50px;
            height: 50px;
            width: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .cta button:hover {
            background-color: rgba(255, 255, 255, 0.8);
            color: rgb(53, 53, 53);
        }
        body::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    filter: blur(10px); /* 模糊效果 */
    z-index: -1; /* 确保背景层在最底层 */
    transform: scale(1.1); /* 调整模糊边缘 */
    background-image: var(--bg-image, none); /* 默认无背景 */
}
.left-text {
            position: absolute;
        height: 600px;
            left: 50px;
            top: 45%;
            transform: translateY(-50%);
            z-index: 1;
            color: white;
            text-align: left;         
            padding: 20px;
            border-radius: 10px;
            writing-mode: vertical-rl; 
            font-size: 25px;
            line-height: 1.8;
        }
    </style>
</head>

<body>
    <div class="follow"></div>
    <div class="left-text">
        <p>供养人在敦煌壁画中是一个非常独特且重要的形象,它们主要出现在佛教石窟寺的壁画之中。</p>
        <p>供养人指的是那些出钱或物资资助建造石窟、绘制壁画和雕塑佛像的人们。</p>
        <p>这些人物在壁画中通常被描绘成跪姿或站姿\手持供品如香炉、花卉或其他象征性物品。</p>
        <p>供养人的形象不仅限于个人，还包括僧侣乃至皇室成员。</p>
    </div>
    <div class="shell">
        <div class="carousel">
            <ol class="boxs">
                <li class="box">
                    <img src="img/供养人/2.png" alt="">
                </li>
                <li class="box">
                    <img src="img/供养人/3.png" alt="">
                </li>
                <li class="box">
                    <img src="img/供养人/4.png" alt="">
                </li>
                <li class="box">
                    <img src="img/供养人/5.png" alt="">
                </li>
                <li class="box">
                    <img src="img/供养人/6.png" alt="">
                </li>
                <li class="box">
                    <img src="img/供养人/7.png" alt="">
                </li>
                <li class="box">
                    <img src="img/供养人/8.png" alt="">
                </li>
                <li class="box">
                    <img src="img/供养人/9.png" alt="">
                </li>
                <li class="box">
                    <img src="img/供养人/10.png" alt="">
                </li>
                <li class="box">
                    <img src="img/供养人/11.png" alt="">
                </li>

            </ol>
        </div>
        <div class="arrows">
            <button class="up"><i class="iconfont icon-shangjiantou"></i></button>
            <button class="next"><i class="iconfont icon-xiajiantou"></i></button>
        </div>
    </div>
    <div class="cta">
        <button onclick="window.location.href='色彩交融.html'">
            返回上一页
            <i class="fa-solid fa-arrow-right"></i>
        </button>
    </div>

</body>


<script>

    // 获取外层容器 
    const shell = document.querySelector('.boxs');
    // 获取所有子元素 
    const cells = shell.querySelectorAll('.box');
    // 获取容器宽度 
    const cellWidth = shell.offsetWidth;
    // 获取容器高度 
    const cellHeight = shell.offsetHeight;
    // 设置子元素大小为容器高度 
    const cellSize = cellHeight;
    // 子元素数量 
    const cellCount = 10;
    // 计算半径 
    const radius = Math.round((cellSize / 1.8) / Math.tan(Math.PI / cellCount));
    // 计算每个子元素的角度 
    const theta = 360 / cellCount;
    // 当前选中的子元素索引 
    let selectedIndex = 0;
    function rotateshell() {
        // 计算旋转角度 
        const angle = theta * selectedIndex * -1;
        // 设置容器的旋转和平移效果 
        shell.style.transform = 'translateZ(' + -radius + 'px) ' + 'rotateX(' + -angle + 'deg)';
        // 计算当前选中的子元素索引 
        const cellIndex = selectedIndex < 0 ? (cellCount - ((selectedIndex * -1) % cellCount)) : (selectedIndex % cellCount);
        cells.forEach((cell, index) => {
            if (cellIndex === index) {
                // 添加选中样式 
                cell.classList.add('selected');
            } else {
                // 移除选中样式 
                cell.classList.remove('selected');
            }
        });
    }
    function selectPrev() {
        // 选中上一个子元素 
        selectedIndex--;
        // 旋转容器 
        rotateshell();
    }
    function selectNext() {
        // 选中下一个子元素 
        selectedIndex++;
        // 旋转容器 
        rotateshell();
    }
    // 获取上一个按钮 
    const prevButton = document.querySelector('.up');
    // 绑定点击事件 
    prevButton.addEventListener('click', selectPrev);
    // 获取下一个按钮 
    const nextButton = document.querySelector('.next');
    // 绑定点击事件 
    nextButton.addEventListener('click', selectNext);
    function initshell() {
        cells.forEach((cell, i) => {
            // 计算每个子元素的角度 
            const cellAngle = theta * i;
            // 设置每个子元素的旋转和平移效果 
            cell.style.transform = 'rotateX(' + -cellAngle + 'deg) translateZ(' + radius + 'px)';
        });
        // 初始化旋转容器 
        rotateshell();
    }
    // 调用初始化函数 
    initshell();

    
    function rotateshell() {
    // 计算旋转角度 
    const angle = theta * selectedIndex * -1;
    // 设置容器的旋转和平移效果 
    shell.style.transform = 'translateZ(' + -radius + 'px) ' + 'rotateX(' + -angle + 'deg)';
    
    // 计算当前选中的子元素索引 
    const cellIndex = selectedIndex < 0 ? (cellCount - ((selectedIndex * -1) % cellCount)) : (selectedIndex % cellCount);
    cells.forEach((cell, index) => {
        if (cellIndex === index) {
            // 添加选中样式 
            cell.classList.add('selected');
            
            // 更新背景图片
            const imgSrc = cell.querySelector('img').getAttribute('src');
            document.body.style.setProperty('--bg-image', `url(${imgSrc})`);
        } else {
            // 移除选中样式 
            cell.classList.remove('selected');
        }
    });
}

// 初始化时设置默认背景
function initshell() {
    cells.forEach((cell, i) => {
        // 计算每个子元素的角度 
        const cellAngle = theta * i;
        // 设置每个子元素的旋转和平移效果 
        cell.style.transform = 'rotateX(' + -cellAngle + 'deg) translateZ(' + radius + 'px)';
    });
    // 初始化旋转容器 
    rotateshell();

    // 设置初始背景图片
    const initialImgSrc = cells[0].querySelector('img').getAttribute('src');
    document.body.style.setProperty('--bg-image', `url(${initialImgSrc})`);
}

let follow = document.querySelector('.follow'); // 更新选择器
let imgl = 0, imgt = 0;

// 设置平滑移动的动画循环
function moveImage() {
    requestAnimationFrame(moveImage);

    // 获取鼠标在整个文档中的位置
    let mouseX = window.mouseX || 0;
    let mouseY = window.mouseY || 0;

    // 计算图片的目标位置
    let targetX = mouseX - follow.clientWidth / 2; // 使用新的变量名
    let targetY = mouseY - follow.clientHeight / 2; // 使用新的变量名

    // 平滑移动逻辑
    imgl += (targetX - imgl) * 0.1; // 缓慢接近目标 X
    imgt += (targetY - imgt) * 0.1; // 缓慢接近目标 Y

    // 更新图片位置
    follow.style.left = imgl + "px"; // 使用新的变量名
    follow.style.top = imgt + "px"; // 使用新的变量名

    // 计算旋转角度
    let imgx = mouseX - (follow.offsetLeft + follow.clientWidth / 2); // 使用新的变量名
    let imgy = mouseY - (follow.offsetTop + follow.clientHeight / 2); // 使用新的变量名
    let deg = 360 * Math.atan(imgy / imgx) / (2 * Math.PI);

    // 判断是否需要翻转
    let y = follow.offsetLeft < mouseX ? -180 : 0; // 使用新的变量名

    // 设置小图片的旋转和翻转
    follow.style.transform = "rotateZ(" + deg + "deg) rotateY(" + y + "deg)"; // 使用新的变量名
}

// 初始化动画循环
moveImage();

// 监听鼠标移动事件
window.addEventListener('mousemove', function (event) {
    // 更新全局鼠标位置
    window.mouseX = event.pageX;
    window.mouseY = event.pageY;
});

</script>

</html>
