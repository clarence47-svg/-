<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经变画</title>
    <style>
         /* 模糊背景层 */
         body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(10px); /* 模糊效果 */
            z-index: -1; /* 背景层在最底层 */
            transform: scale(1.1); /* 调整模糊边缘 */
            background-image: var(--bg-image, none); /* 默认无背景 */
        }
         body {
    background-color: rgb(60, 60, 70);
    background-image: url('img/背景 暖色.png'); /* 添加背景图片路径 */
    background-size: cover; /* 背景图片根据屏幕大小自动调整尺寸 */
    background-position: center; /* 图片居中显示 */
    background-repeat: no-repeat; /* 防止图片重复 */
    display: flex;
    justify-content: center;
    
}
         .cta {
  position: absolute;
  bottom: 8%;
  display: flex;
  justify-content: center;
  width: 100%;
  z-index: 1;
}

.cta button {
  font-size: 15px;
  font-weight: 400;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.8);
  background-color: transparent;
  border: 1px solid rgba(255, 255, 255, 0.8);
  border-radius: 50px;
  height: 50px;
  width: 300px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.2s;
  cursor: pointer;
}

.cta button:hover {
  background-color: rgba(255, 255, 255, 0.8);
  color:rgb(53, 53, 53);
}
        
        *{
            padding: 0;
            margin: 0;
        }
        * {
            padding: 0px;
            margin: 0px;
            list-style: none;
            bottom: 0;
            text-decoration: none;
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: rgb(170, 190, 250);
        }
        .shell {
            width: 1100px;
            height: 500px;
            position: absolute;
            top: 80px;
            overflow: hidden;
            border-radius: 5px;
            /*border: 10px #fff solid;*/
            box-shadow: 20px 30px 20px rgba(0, 0, 0, 0.647);
        }

        .images {
            width: 300%;
            height: 100%;
            display: flex;
            position: absolute;
            left: 0;
            transition: .2s;
        }

        .img{
            width: 100%;
            background-size: cover;
        }
        .img:nth-child(1){
            background-image: url("img/山水画/3.png");
        }
        .img:nth-child(2){
            background-image: url("img/山水画/2.png");
        }
        .img:nth-child(3){
            background-image: url("img/山水画/1.png");
        }

        .min-images {
            display: flex;
            justify-content: space-evenly;
            position: absolute;
            bottom: 20px;
            width: 40%;
            z-index: 999;
            right: 10%;
        }

        .min{
            width: 60px;
            height: 60px;
            cursor: pointer;
            border-radius: 50%;
            background-size: cover;
            border: solid rgba(255, 255, 255, 0.5) 5px;
            background-position: -20px 0;
        }
        .min:nth-child(1){
            background-image: url("img/山水画/3.png");
        }
        .min:nth-child(2){
            background-image: url("img/山水画/2.png");
        }
        .min:nth-child(3){
            background-image: url("img/山水画/1.png");
        }

        .button {
            width: 100%;
            height: 100%;
            position:absolute;
            display: flex;
            justify-content: space-between;
            user-select:none;
        }

        .button-left,
        .button-right {
            font-size: 50px;
            /*background-color: rgba(160, 193, 255, 0.7);*/
            padding: 0 20px;
            cursor: pointer;
            line-height: 500px;
        }
        .left-text {
            position: absolute;
            width:1100px;
            left: 185px;
            top: 680px;
            transform: translateY(-50%);
            z-index: 1;
            color: white;
            text-align: left;
            padding: 20px;
            border-radius: 10px;
            font-size: 18px;
            line-height: 1.8;
        }
        
    </style>
</head>

<body>
    <div class="left-text">
        <p>敦煌壁画中的树木图像整体上学习中原汉晋古法中的树木造型画法。北周至唐朝时期，洞窟壁画发展迅速，山水图像的发展也齐头并进，画法更加灵活多变，山、水、树、云以及山间的花草勾画起来行云流水，得心应手。
            山的轮廓变化渐多，山石与树木、人物、动物的关系处理得生动自然。此时山水的形式已经在佛传故事画中形成了固定的格式。山水、树木、房舍等元素和佛传故事中的情节交织在一起，共同构成了形象生动且美不胜收的连环故事画。</p>
    </div>
    <div class="shell">
        <ui class="images">
            <li class="img"></li>
            <li class="img"></li>
            <li class="img"></li>
        </ui>
            <ui class="min-images">
                <li class="min"></li>
                <li class="min"></li>
                <li class="min"></li>
            </ui>
        <div class="button">
            <div class="button-left"><</div>
            <div class="button-right">></div>
        </div>
    </div>
    <div class="cta">
        <button onclick="window.location.href='色彩交融.html'">
          返回上一页
          <i class="fa-solid fa-arrow-right"></i>
        </button>
      </div>
</body>
<script>
   let left = document.querySelector(".button-left");
        let right = document.querySelector(".button-right");
        let min = document.querySelectorAll(".min");
        let images = document.querySelector(".images");

        // 当前图片索引和定时器
        let index = 0;
        let time;

        // 设置当前图片位置
        function position() {
            images.style.left = (index * -100) + "%";
        }

        // 更新背景图片为当前图片的模糊版本
        function updateBackground() {
            const currentImage = document.querySelectorAll(".img")[index];
            const backgroundImage = getComputedStyle(currentImage).backgroundImage;
            document.body.style.setProperty('--bg-image', backgroundImage);
        }

        // 向右切换图片
        function add() {
            if (index >= min.length - 1) {
                index = 0;
            } else {
                index++;
            }
        }

        // 向左切换图片
        function desc() {
            if (index < 1) {
                index = min.length - 1;
            } else {
                index--;
            }
        }

        // 定时器函数
        function timer() {
            clearInterval(time);
            time = setInterval(() => {
                add();
                position();
                updateBackground();
            }, 3000);
        }

        // 左按钮点击事件
        left.addEventListener("click", () => {
            desc();
            position();
            updateBackground();
            clearInterval(time);
            timer();
        });

        // 右按钮点击事件
        right.addEventListener("click", () => {
            add();
            position();
            updateBackground();
            clearInterval(time);
            timer();
        });

        // 小图片按钮点击事件
        for (let i = 0; i < min.length; i++) {
            min[i].addEventListener("click", () => {
                index = i;
                position();
                updateBackground();
                clearInterval(time);
                timer();
            });
        }

        // 初始化背景和定时器
        updateBackground();
        timer();
</script>

</html>
