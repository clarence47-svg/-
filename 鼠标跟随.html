<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山羊の前端小窝</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background: rgb(240, 230, 240);
        }
        .follow{
            width: 20px;
            height: 20px;
            position: absolute;
            background-image: url('img/鼠标跟随.png');
            background-size:cover;
            background-repeat:no-repeat;
        }
    </style>
</head>

<body>
    <div class="follow"></div>
</body>
<script>
let follow = document.querySelector('.follow'); // 更新变量名称和选择器
// 定义小图片的旋转角度
let deg = 0;
// 定义小图片位于网页左侧的位置
let imgx = 0;
// 定义小图片位于网页顶部的位置
let imgy = 0;
// 定义小图片x轴的位置
let imgl = 0;
// 定义小图片y轴的位置
let imgt = 0;
// 定义小图片翻转的角度
let y = 0;
// 定义一个计数器
let index = 0;

window.addEventListener('mousemove', function (xyz) {
    // 获取网页左侧距离的图片位置
    imgx = xyz.x - follow.offsetLeft - follow.clientWidth / 2; // 使用新的变量名
    // 多去网页顶部距离图片的位置
    imgy = xyz.y - follow.offsetTop - follow.clientHeight / 2; // 使用新的变量名
    // 套入公式，定义图片的旋转角度
    deg = 360 * Math.atan(imgy / imgx) / (2 * Math.PI);
    // 每当鼠标移动的时候重置index
    index = 0;
    // 定义当前鼠标的位置
    let x = event.clientX;
    // 当鼠标的x轴大于图片的时候，提普安就要对着鼠标，所以需要将图片翻转过来
    // 否则就不用翻转
    if (follow.offsetLeft < x) { // 使用新的变量名
        y = -180;
    } else {
        y = 0;
    }
});

setInterval(() => {
    // 设置小图片的旋转和翻转
    follow.style.transform = "rotateZ(" + deg + "deg) rotateY(" + y + "deg)"; // 使用新的变量名
    index++;
    // 在这里设置小图片的位置和速度，并判断小图片到达鼠标位置时停止移动
    if (index < 50) {
        imgl += imgx / 50;
        imgt += imgy / 50;
    }
    follow.style.left = imgl + "px"; // 使用新的变量名
    follow.style.top = imgt + "px"; // 使用新的变量名
}, 10);
</script>
</html>
