<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>北周
    </title>
</head>
<style>
     .img {
            width: 80px;
            height: 50px;
            position: absolute;
            background-image: url('img/鼠标跟随.png'); /* 确保路径正确 */
            background-size: cover;
            background-repeat: no-repeat;
            left: 0;
            top: 0;
            pointer-events: none; /* 防止图片遮挡其他元素的点击事件 */
            z-index: 999; /* 确保图片在最上层 */
        }
     .cta {
  position: absolute;
  bottom: 8%;
  display: flex;
  justify-content: center;
  width: 100%;
  z-index: 1;
}

.cta button {
  font-size: 15px;
  font-weight: 400;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.8);
  background-color: transparent;
  border: 1px solid rgba(255, 255, 255, 0.8);
  border-radius: 50px;
  height: 50px;
  width: 300px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.2s;
  cursor: pointer;
}

.cta button:hover {
  background-color: rgba(255, 255, 255, 0.8);
  color:rgb(53, 53, 53);
}
    * {
        padding: 0;
        margin: 0;
    }
    .shell{
        height: 100vh;
        overflow-x: hidden;
        perspective: 3px;
    }
    .shell div{
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        font-style: 30px;
        letter-spacing: 2px;
    }
    .image{
        transform: translateZ(-1px) scale(1.6);
        background-size: cover;
        height: 100vh;
        z-index: -1;
    }
    .text{
        height: 50vh;
        background-color: #fff;
    }
    .text h1{
        color: #000;
        margin-left: 150px;
        margin-right:150px;
    }
    .heading{
        z-index: -1;
        transform: translateY(-30vh) translateZ(1px);
        color: #fff;
        font-size: 50px;
        letter-spacing: 10px;
    }
</style>

<body>
    <div class="shell">
        <div class="img"></div>
        <div class="image" style="background-image: url('img/北周/1.png');"></div>
        <div class="heading">
            <h1>北周</h1>
        </div>
        <div class="text">
            <h1>北朝早期，佛教利用佛经故事画来宣传佛教思想，北周达到了高潮，而且艺术上也达到了较高的水平。佛经故事画的内容而大量北魏、西魏的佛经故事画，可分为三类，即本生故事、因缘故事和本事故事。</h1>
        </div>

        <div class="image" style="background-image: url('img/北周/2.png');"></div>
        <div class="heading">
            <h1>第三四三窟 南壁</h1>
        </div>
        <div class="text">
            <h1>故事画是北周壁画艺术中成就最高者。早期石窟寺中，故事画具有重要的意义，亦有多种表现形式。敦煌北朝时期故事画，由军械局发展到长卷式连续构图，到了北周，取得了空前的艺术成就。</h1>
        </div>

        <div class="image" style="background-image: url('img/北周/3.png');"></div>
        <div class="heading">
            <h1>第四二八窟 西壁</h1>
        </div>
        <div class="text">
            <h1>佛光圆案，一般是指衬托佛像的头光和背光。北周时期的佛光圆案，无论是在形式上还是在内容上，都表现出了与西域风格的明显区别，显示出了中原风格的影响。</h1>
        </div>

        <div class="image" style="background-image: url('img/北周/4.png');"></div>
        <div class="heading">
            <h1></h1>
        </div>

        <div class="cta">
            <button onclick="window.location.href='历代遗韵.html'">
              返回上一页
              <i class="fa-solid fa-arrow-right"></i>
            </button>
          </div>
    </div>
</body>
<script>
    let img = document.querySelector('.img');
       let imgl = 0, imgt = 0;

       // 设置平滑移动的动画循环
       function moveImage() {
           requestAnimationFrame(moveImage);

           // 获取鼠标在整个文档中的位置
           let mouseX = window.mouseX || 0;
           let mouseY = window.mouseY || 0;

           // 计算图片的目标位置
           let targetX = mouseX - img.clientWidth / 2;
           let targetY = mouseY - img.clientHeight / 2;

           // 平滑移动逻辑
           imgl += (targetX - imgl) * 0.1; // 缓慢接近目标 X
           imgt += (targetY - imgt) * 0.1; // 缓慢接近目标 Y

           // 更新图片位置
           img.style.left = imgl + "px";
           img.style.top = imgt + "px";

           // 计算旋转角度
           let imgx = mouseX - (img.offsetLeft + img.clientWidth / 2);
           let imgy = mouseY - (img.offsetTop + img.clientHeight / 2);
           let deg = 360 * Math.atan(imgy / imgx) / (2 * Math.PI);

           // 判断是否需要翻转
           let y = img.offsetLeft < mouseX ? -180 : 0;

           // 设置小图片的旋转和翻转
           img.style.transform = "rotateZ(" + deg + "deg) rotateY(" + y + "deg)";
       }

       // 初始化动画循环
       moveImage();

       // 监听鼠标移动事件
       window.addEventListener('mousemove', function (event) {
           // 更新全局鼠标位置
           window.mouseX = event.pageX;
           window.mouseY = event.pageY;
       });
   
</script>

</html>
