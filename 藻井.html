<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, intial-scale=1.0">
    <title>藻井</title>
    <style>
        .cta {
            position: fixed;
            right: 20px;
            /* 距离右边20px */
            top: 50%;
            transform: translateY(-50%) rotate(90deg);
            /* 垂直居中并旋转90度 */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }


        .cta button {
            font-size: 15px;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;

            color: rgba(255, 255, 255, 0.8);
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 50px;
            height: 50px;
            width: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            cursor: pointer;
            transform: translateY(-50%);
            /* writing-mode: vertical-lr; */

        }

        .button-text {
            transform: rotate(-90deg);
            display: inline-block;
            /* 必须加，才能让 transform 生效 */
        }

        .cta button:hover {
            background-color: rgba(255, 255, 255, 0.8);
            color: rgb(53, 53, 53);
        }

        .background-blur {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(10px);
            /* 调整此值以增加或减少模糊度 */
            z-index: -1;
        }

        * {
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            /*place-items:center;*/
            align-items: center;
            background-color: #dbddff;
            background-size: cover;
            /* 背景图片大小覆盖整个视口 */
            background-position: center;
            background-repeat: no-repeat;
            /* 确保背景图片不重复 */
        }

        .shell {
            --size: 100px;
            display: grid;
            grid-template-columns: repeat(8, var(--size));
            grid-auto-rows: var(--size);
            place-items: center;
            gap: 15px;
            margin-bottom: 50px;
            margin-left: 300px;
        }

        .shell img {
            object-fit: cover;
            width: 100%;
            height: 100%;
            transform: rotate(-45deg)scale(1.5);
            transition: .0.5s;
        }

        .box {
            width: 130px;
            height: 130px;
            position: relative;
            overflow: hidden;
            transform: rotate(45deg);
            display: flex;
            align-items: center;
            justify-content: right;
            grid-column: auto/span 2;
            border-radius: 10px;
            box-shadow: 5px 0 5px #00000027;
            border: 5px solid #fff;
            cursor: pointer;
            transition: .3s;
        }

        .box:nth-child(7n-2) {
            grid-column: 2/span 2;
        }

        .shell:hover img:not(:hover) {
            filter: brightness(0.5)contrast(0.8);
        }

        .box:hover {
            transform: rotate(0)scale(1.6);
            z-index: 1;
        }

        .left-text {
            position: absolute;
            height: 600px;
            left: 50px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
            color: white;
            text-align: left;
            padding: 20px;
            border-radius: 10px;
            writing-mode: vertical-rl;
            font-size: 25px;
            line-height: 1.8;
        }
    </style>
</head>

<body>
    <div class="left-text">
        <p>藻井，又称绮井、天井、方井、复海、斗八、圜</p>
        <p>有方形、多边形或圆形凹面，周围饰以各种花藻井纹、雕刻和彩绘。</p>
        <p> 多用在宫殿宝座、寺庙佛坛上方最重要部位。</p>
    </div>
    <div class="background-blur"></div>
    <div class="shell">
        <div class="box">
            <img src="img/藻井/2.png">
        </div>
        <div class="box">

        </div>

        </div>
        <div class="box">
            <img src="img/藻井/24.png">
        </div>
        <div class="box">
            <img src="img/藻井/26.png">
        </div>
        <div class="box">
            <img src="img/藻井/14.png">
        </div>
        <div class="box">
            <img src="img/藻井/15.png">
        </div>
        <div class="box">
            <img src="img/藻井/16.png">
        </div>
        <div class="box">
            <img src="img/藻井/17.png">
        </div>
        <div class="box">
            <img src="img/藻井/18.png">
        </div>
        <div class="box">
            <img src="img/藻井/19.png">
        </div>
        <div class="box">
            <img src="img/藻井/20.png">
        </div>
        <div class="box">
            <img src="img/藻井/12.png">
        </div>
        <div class="box">

        </div>

        </div>
        <div class="box">

        </div>
        <div class="box">
            <img src="img/藻井/13.png">
        </div>
        <div class="box">
            <img src="img/藻井/27.png">
        </div>

    </div>
    <div class="cta">
        <button onclick="window.location.href='色彩交融.html'">
            <div class="button-text">
                返<br>
                <br>
                回<br>
                <br>
                上<br>
                <br>
                一<br>
                <br>
                页<br>
            </div>
            <i class="fa-solid fa-arrow-right"></i>
        </button>
    </div>
</body>

<script>
    document.querySelectorAll('.box').forEach(function (wrapper) {
        wrapper.addEventListener('mousemove', function (e) {
            const rect = wrapper.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            const img = wrapper.querySelector('img');
            img.style.transform = 'rotate(0deg) translate3d(${x*-0.5}px,${y*-0.5}px,0) scale(1.8)';
        });

        wrapper.addEventListener('mouseleave', function () {
            const img = wrapper.querySelector('img');
            img.style.transform = 'rotate(-45deg) scale(1.5)';
        });
    });
    const setBackgroundImage = (src) => {
        document.querySelector('.background-blur').style.backgroundImage = `url(${src})`;
    };

    // 设置初始背景图片为第一个图片
    const firstImgSrc = document.querySelector('.shell .box img').src;
    setBackgroundImage(firstImgSrc);

    document.querySelectorAll('.box').forEach(function (wrapper) {
        wrapper.addEventListener('mousemove', function (e) {
            const img = wrapper.querySelector('img');
            setBackgroundImage(img.src); // 更新背景图片

            const rect = wrapper.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            img.style.transform = `rotate(0deg) translate3d(${x * -0.5}px, ${y * -0.5}px, 0) scale(1.8)`;
        });

        wrapper.addEventListener('mouseleave', function () {
            const img = wrapper.querySelector('img');
            img.style.transform = 'rotate(-45deg) scale(1.5)';
        });
    });
</script>

</html>
